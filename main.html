<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./styles.css">     <!-- style file -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <title>Issues | Github Tracker</title>
</head>
<body class="bg-[#F8FAFC] min-h-screen">

    <!-- navbar -->
    <section class="navbar bg-white shadow-sm">
        <div class="w-11/12 mx-auto flex justify-between items-center">
            <!-- left: logo -->
            <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" class="h-9" alt="github-logo">
            <a class="btn btn-ghost text-[22px]">GitHub Issues Tracker</a>
            </div>

            <!-- large -->
            <div class="hidden md:flex items-center gap-4">
                <label class="input input-bordered border-[#E4E4E7] w-[300px] text-base text-[#64748B]">
                    <i class="fa-solid fa-magnifying-glass opacity-50"></i>
                    <input type="text" class="grow" placeholder="Search issues..." />
                </label>

                <button class="btn btn-primary font-semibold text-base shadow-none text-white transition duration-300 hover:scale-[1.01] hover:bg-blue-700 hover:opacity-95 hover:shadow-md"><i class="fa-solid fa-plus"></i> New Issue</button>  
            </div>
        
            <!-- small -->
            <div class="dropdown dropdown-end md:hidden">
                <label tabindex="0" class="btn btn-ghost">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
                </label>
                <div tabindex="0" class="dropdown-content mt-3 z-[1] p-4 shadow bg-base-100 rounded-box w-64 space-y-3">
                    <label class="input input-bordered w-full border-[#E4E4E7] text-base text-[#64748B]">
                        <i class="fa-solid fa-magnifying-glass opacity-50"></i>
                        <input type="text" class="grow" placeholder="Search issues..." />
                    </label>
                    
                    <button class="btn btn-primary font-semibold text-base shadow-none w-full mx-auto text-white transition duration-300 hover:scale-[1.01] hover:bg-blue-700 hover:opacity-95 hover:shadow-md"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </div>
    </section>
    
    <!-- tab section --md:w-7/10 -->
    <section class="">
        <div class="sm:w-11/12 mx-auto p-6 m-0 bg-white shadow-sm rounded-lg md:w-7/10 md:mt-14">
            <!-- jobs toggles -->
            <div class="space-x-2">
                <button onclick="showOnly(), toggleBtn0()" id="" class="btn bg-primary text-white px-7 md:px-12">All</button>
                <button onclick="showOnly(), toggleBtn1()" id="" class="btn bg-white rounded border-[#E4E4E7] text-[#64748B] px-6 md:px-10">Open</button>
                <button onclick="showOnly(), toggleBtn2()" id="" class="btn bg-white rounded border-[#E4E4E7] text-[#64748B] px-6 md:px-10">Closed</button>
            </div>
        </div>
    </section>

    <!-- issues section -->
    <section class="sm:w-11/12 mx-auto p-6 mt-4 bg-white shadow-md rounded-t-lg md:w-7/10">
        <div id="" class="bg-white flex items-center">
            <div class="bg-[#ECE4FF] h-12 w-12 flex items-center justify-center rounded-full mr-2"><img src="./assets/Aperture.png" alt=""></div>
            <div class="">
                <h2 class="font-semibold text-xl text-[#1F2937]"><span id="total-issues"></span> Issues</h2>
                <p class="text-base text-[#64748B]">Track and manage your project issues</p>
            </div>
            <div class="flex gap-4 ml-auto">
                <p class="text-base font-medium"><i class="fa-solid fa-circle text-xs text-[#00A96E]"></i> Open</p>
                <p class="text-base font-medium"><i class="fa-solid fa-circle text-xs text-[#A855F7]"></i> Closed</p>
            </div>
        </div>
    </section>
    
    <!-- card designing -->
    <section class="border-t border-[#d7d7d9] bg-[#FBFBFB] sm:w-11/12 mx-auto p-6 shadow-md rounded-b-lg md:w-7/10">
        <div class="card bg-base-100 shadow-md rounded-xl w-70 border border-base-200">
            <div class="card-body p-4 gap-3">

                <div class="flex items-center justify-between">
                    <img src="./assets/Open-Status.png" alt="Open-Status">
                    <span class="badge bg-red-100 text-red-400 border-none font-semibold text-xs px-7 py-2 rounded-full">HIGH</span>
                </div>
                
                <h2 id="" class="card-title text-sm font-semibold pt-1">Fix Navigation Menu On Mobile Devices</h2>
                <p id="" class="text-sm text-[#64748B]">The navigation menu doesn't collapse properly on mobile devices…</p>

                <!-- tags -->
                <div class="flex gap-2 flex-wrap">
                    <span class="badge bg-red-100 text-red-400 border-[#EF4444] font-semibold text-xs px-3 py-2 rounded-full gap-1"><i class="fa-solid fa-bug"></i> BUG</span>
                    <span class="badge bg-yellow-100 text-yellow-600 border-[#D97706] font-semibold text-xs px-3 py-2 rounded-full gap-1"><i class="fa-regular fa-life-ring"></i> HELP WANTED</span>
                </div>

                <div class="divider my-0"></div>

                <div class="text-xs text-[#64748B] space-y-2">
                    <p>#<span id="">1</span> by <span id="">john_doe</span></p>
                    <p id="">1/15/2024</p>
                </div>
            </div>
        </div>
    </section>

    <script src="./scripts/main.js"></script>
</body>
</html>
