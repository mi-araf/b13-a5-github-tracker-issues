<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="./styles.css">     <!-- style file -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <title>Issues | Github Tracker</title>
</head>
<body class="bg-[#F8FAFC] min-h-screen pb-15">

    <!-- navbar -->
    <section class="navbar bg-white shadow-sm">
        <div class="w-11/12 mx-auto flex justify-between items-center">
            <!-- left: logo -->
            <div class="flex items-center gap-2">
            <img src="./assets/github-logo.png" class="h-9" alt="github-logo">
            <a class="btn btn-ghost text-[22px]">GitHub Issues Tracker</a>
            </div>

            <!-- large -->
            <div class="hidden md:flex items-center gap-4">
                <label class="input input-bordered border-[#E4E4E7] w-[300px] text-base text-[#64748B]">
                    <i class="fa-solid fa-magnifying-glass opacity-50"></i>
                    <input type="text" class="grow input-search-box" placeholder="Search issues..." />
                        <button type="button" class="clear-search-btn cursor-pointer">
                            <i class="fa-solid fa-xmark text-sm"></i>
                         </button>
                </label>

                <button class="btn btn-primary font-semibold text-base shadow-none text-white transition duration-300 hover:scale-[1.01] hover:bg-blue-700 hover:opacity-95 hover:shadow-md"><i class="fa-solid fa-plus"></i> New Issue</button>  
            </div>
        
            <!-- small -->
            <div class="dropdown dropdown-end md:hidden">
                <label tabindex="0" class="btn btn-ghost">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"> <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h8m-8 6h16" /> </svg>
                </label>
                <div tabindex="0" class="dropdown-content mt-3 z-[1] p-4 shadow bg-base-100 rounded-box w-64 space-y-3">
                    <label class="input input-bordered w-full border-[#E4E4E7] text-base text-[#64748B]">
                        <i class="fa-solid fa-magnifying-glass opacity-50"></i>
                        <input type="text" class="grow input-search-box" placeholder="Search issues..." />
                    </label>
                    
                    <button class="btn btn-primary font-semibold text-base shadow-none w-full mx-auto text-white transition duration-300 hover:scale-[1.01] hover:bg-blue-700 hover:opacity-95 hover:shadow-md"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </div>
    </section>
    
    <!-- tab section --md:w-8/10 -->
    <section class="">
        <div class="sm:w-11/12 mx-auto p-6 m-0 bg-white shadow-sm rounded-lg md:w-8/10 md:mt-14">
            <!-- jobs toggles -->
            <div class="space-x-2">
                <button onclick="showOnly('all'), filterIssues('all')" id="tab-all" class="btn bg-primary text-white px-7 md:px-12">All</button>
                <button onclick="showOnly('open'), filterIssues('open')" id="tab-open" class="btn bg-white rounded border-[#E4E4E7] text-[#64748B] px-6 md:px-10">Open</button>
                <button onclick="showOnly('closed'), filterIssues('closed')" id="tab-closed" class="btn bg-white rounded border-[#E4E4E7] text-[#64748B] px-6 md:px-10">Closed</button>
            </div>
        </div>
    </section>

    <!-- issues section -->
    <section class="sm:w-11/12 sm:mt-4 mt-1 mx-auto p-6 bg-white shadow-md rounded-t-lg md:w-8/10">
        <div id="" class="bg-white flex items-center">
            <div class="sm:h-12 sm:w-12 h-6 bg-[#ECE4FF] flex items-center justify-center rounded-full mr-2"><img src="./assets/Aperture.png" alt=""></div>
            <div class="">
                <h2 class="sm:text-xl font-semibold text-base text-[#1F2937]"><span id="total-issues"></span> Issues</h2>
                <p class="sm:text-base text-xs text-[#64748B]">Track and manage your project issues</p>
            </div>
            <div class="flex gap-4 ml-auto">
                <p class="sm:text-base text-xs font-medium"><i class="fa-solid fa-circle text-xs text-[#00A96E]"></i> Open</p>
                <p class="sm:text-base text-xs font-medium"><i class="fa-solid fa-circle text-xs text-[#A855F7]"></i> Closed</p>
            </div>
        </div>
    </section>
    
    <!-- loading spinner -->
    <section id="spinner" class="grid grid-cols-3 gap-4 w-fit mx-auto py-10 hiden">
        <div class="loading loading-cricle loading-xl mr-2"></div>
        <div class="loading loading-dots loading-xl"></div>
        <div class="loading loading-circle loading-xl"></div>
    </section>

    <!-- card designing -->
    <section id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch border-t border-[#d7d7d9] bg-[#FBFBFB] sm:w-11/12 mx-auto p-6 shadow-md rounded-b-lg md:w-8/10">
        <!-- card's codes -->
    </section>

    <!-- modal -->
    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box max-w-2xl p-7">
            <div id="details-container">
                <!-- dynamically add -- codes -->
            </div>
            <div class="modal-action">
            <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn btn-primary">Close</button>
            </form>
            </div>
        </div>
    </dialog>

    <script src="./scripts/main.js"></script>
</body>
</html>
