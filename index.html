<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- daisyUI + tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="stylesheet" href="./styles.css">     <!-- style file -->
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">

    <title>Login | Github Tracker</title>
</head>
<body class="bg-[#F8FAFC] min-h-screen py-16">

    <!-- sign IN -->
    <section class="max-w-md mx-auto min-h-screen bg-white shadow-lg rounded-lg p-8">

        <div class="image text-center">
            <img class="mx-auto pb-6" src="./assets/github-logo.png" alt="github-logo">
            <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
            <p class="text-base text-[#64748B] pt-1 pb-6">Sign in to manage your issues</p>
        </div>

        <div class="w-full">
            <fieldset class="fieldset">
                <label class="text-[#1F2937] text-base font-medium">Username</label>
                <input id="user-input" type="text" class="input text-[#64748B] rounded-lg border-[#E4E4E7] w-full" placeholder="Enter Username" />
                <p class="text-sm text-primary mb-4">Default: admin</p>

                <label class="text-[#1F2937] text-base font-medium">Password</label>
                <input id="user-pass" type="password" class="input text-[#64748B] rounded-lg border-[#E4E4E7] w-full" placeholder="Enter password" />
                <p class="text-sm text-primary">Default: admin123</p>

                <button id="sign-in-btn" class="btn btn-primary rounded-lg mt-5 mb-2 text-base font-semibold transition duration-300 hover:scale-[1.01] hover:bg-blue-700 hover:opacity-95">Sign In</button>
            </fieldset>

            <div class="divider">OR</div>

            <p class="mt-6 mb-2 text-center text-sm text-[#64748B]">Demo Credentials:</p>

            <div class="bg-[#F8FAFC] p-6 rounded-lg text-center text-base text-[#1F2937]">
                <p class="font-semibold">Username: <span class="font-normal">admin</span></p>
                <p class="font-semibold">Password: <span class="font-normal">admin123</span></p>
            </div>    
        </div>
    </section>


    <script src="./scripts/signin.js"></script>

</body>
</html>
